name: test-supplement
description: Automated test case gap analysis and supplement for kweaver-eval
goal: >
  Analyze test coverage gaps across all KWeaver modules (Decision Agent, BKN,
  Vega, Context Loader, Execution Factory, Dataflow, TraceAI) by comparing
  backend capabilities against existing test cases. Supplement missing tests
  for core flows and corner cases, triage failures, and produce a summary report.

stages:
  - name: env-check
    roles: [env_checker]

  - name: coverage-audit
    roles: [auditor]
    timeout: 1800000

  - repeat:
      name: supplement-loop
      max_iterations: 5
      until: coverage-sufficient
      stages:
        - name: write-tests
          roles: [test_writer]
          max_retries: 2
          timeout: 1800000
        - name: run-and-triage
          roles: [triage_runner]
          max_retries: 1
          timeout: 1800000

  - name: report
    roles: [reporter]
